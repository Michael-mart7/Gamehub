<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>GAMEHUB</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet">

    <style>

        :root{
            --navy:#0d0f1a;
            --panel:#13172a;
            --card:#1a1f35;
            --border:#252b45;
            --accent:#4f6ef7;
            --accent2:#7c3aed;
            --text:#e8eaf6;
            --muted:#8b92b0;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:var(--navy);
            color:var(--text);
            font-family:'DM Sans', sans-serif;
        }

        /* NAVBAR */

        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:1.5rem 3rem;
            background:rgba(0,0,0,.2);
            border-bottom:1px solid var(--border);
        }

        .logo{
            font-family:'Syne', sans-serif;
            font-size:1.8rem;
            font-weight:800;

            background:linear-gradient(
                    135deg,
                    white,
                    var(--accent)
            );

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .nav-buttons{
            display:flex;
            gap:1rem;
        }

        .btn{
            border:none;
            cursor:pointer;
            border-radius:12px;
            padding:.8rem 1.5rem;
            font-weight:600;
            transition:.2s;
        }

        .btn-login{
            background:transparent;
            color:white;
            border:1px solid var(--border);
        }

        .btn-login:hover{
            background:var(--panel);
        }

        .btn-register{
            background:var(--accent);
            color:white;
        }

        .btn-register:hover{
            opacity:.85;
        }

        /* HERO */

        .hero{
            text-align:center;
            padding:6rem 2rem 4rem;
        }

        .hero h1{
            font-family:'Syne', sans-serif;
            font-size:4rem;
            font-weight:800;
            margin-bottom:1.5rem;
        }

        .hero p{
            max-width:700px;
            margin:auto;
            color:var(--muted);
            font-size:1.1rem;
            line-height:1.8;
        }

        /* SEARCH */

        .search-box{
            max-width:700px;
            margin:2rem auto 0;
            display:flex;
            gap:1rem;
        }

        .search-box input{
            flex:1;
            background:var(--panel);
            border:1px solid var(--border);
            color:var(--text);
            padding:1rem 1.2rem;
            border-radius:14px;
            outline:none;
        }

        .search-btn{
            background:var(--accent);
            color:white;
        }

        /* CATALOGO */

        .catalogo{
            padding:3rem;
        }

        .catalogo h2{
            font-family:'Syne', sans-serif;
            margin-bottom:2rem;
            font-size:2rem;
        }
		/* NOTICIAS */

		.noticias{
		    padding:3rem;
		}

		.noticias h2{
		    font-family:'Syne', sans-serif;
		    margin-bottom:2rem;
		    font-size:2rem;
		}

		.noticias-grid{
		    display:grid;
		    grid-template-columns:
		        repeat(auto-fit,minmax(350px,1fr));
		    gap:1.5rem;
		}

		.noticia-card{
		    background:var(--card);
		    border:1px solid var(--border);
		    border-radius:20px;
		    overflow:hidden;
		    transition:.25s;
		}

		.noticia-card:hover{
		    transform:translateY(-6px);
		}

		.noticia-img{
		    width:100%;
		    height:220px;
		    object-fit:cover;
		}

		.noticia-content{
		    padding:1.5rem;
		}

		.noticia-content h3{
		    margin-bottom:1rem;
		    font-family:'Syne';
		}

		.noticia-content p{
		    color:var(--muted);
		    line-height:1.6;
		}

        .games-grid{
            display:grid;
            grid-template-columns:
                    repeat(auto-fit,minmax(280px,1fr));
            gap:1.5rem;
        }

        .game-card{
            background:var(--card);
            border:1px solid var(--border);
            border-radius:20px;
            overflow:hidden;
            transition:.25s;
        }

        .game-card:hover{
            transform:translateY(-6px);
        }

        .game-image{
            height:190px;

            background:linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent2)
            );

            display:flex;
            align-items:center;
            justify-content:center;
            font-size:4rem;
        }

        .game-content{
            padding:1.5rem;
        }

        .badge{
            display:inline-block;
            padding:.35rem .8rem;
            border-radius:999px;
            background:rgba(79,110,247,.15);
            color:var(--accent);
            margin-bottom:1rem;
            font-size:.82rem;
        }

        .game-content h3{
            margin-bottom:.6rem;
            font-family:'Syne', sans-serif;
            font-size:1.2rem;
        }

        .game-content p{
            color:var(--muted);
            line-height:1.6;
            margin-bottom:1rem;
            min-height:52px;
        }

        .card-footer{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .price{
            color:var(--accent);
            font-weight:700;
            font-size:1rem;
        }

        .btn-details{
            background:var(--accent);
            color:white;
        }

        .empty-state{
            text-align:center;
            padding:4rem;
            color:var(--muted);
            display:none;
        }

    </style>

</head>

<body>

<div class="navbar">

    <div class="logo">
        GAMEHUB
    </div>

    <div class="nav-buttons">

        <button
                class="btn btn-login"
                onclick="window.location.href='/login'">

            Iniciar sesión

        </button>

        <button
                class="btn btn-register"
                onclick="window.location.href='/registro'">

            Registrarse

        </button>

    </div>

</div>

<section class="hero">

    <h1>
        Tu universo gamer comienza aquí
    </h1>

    <p>
        Descubre videojuegos increíbles,
        explora géneros y encuentra
        tu próxima aventura gamer.
    </p>

    <div class="search-box">

        <input
                type="text"
                id="buscarJuego"
                placeholder="Buscar videojuegos...">

        <button
                class="btn search-btn"
                onclick="buscarJuegos()">

            Buscar

        </button>

    </div>

</section>

<section class="noticias">

    <h2>

        Últimas noticias y promociones

    </h2>

    <div
        id="noticiasGrid"
        class="noticias-grid">

    </div>

</section>

<section class="catalogo">

    <h2>Catálogo de videojuegos</h2>

    <div
            id="sinResultados"
            class="empty-state">

        No se encontraron videojuegos.
    </div>

    <div
            class="games-grid"
            id="gamesGrid">

    </div>

</section>

<script>

    const formatoCOP =
        new Intl.NumberFormat('es-CO');

    async function cargarJuegos(){

        const response =
            await fetch('/api/juegos/activos');

        const juegos =
            await response.json();

        renderizarJuegos(juegos);
    }

	function renderizarJuegos(juegos){

	    const grid =
	        document.getElementById(
	            'gamesGrid'
	        );

	    const empty =
	        document.getElementById(
	            'sinResultados'
	        );

	    grid.innerHTML='';

	    console.log(juegos);

	    if(!juegos || juegos.length===0){

	        empty.style.display='block';
	        return;
	    }

	    empty.style.display='none';

	    juegos.forEach(juego=>{

	        const precio =
	            juego.precio || 0;

	        const descripcion =
	            juego.descripcion || 'Sin descripción';

	        const genero =
	            juego.genero || 'General';

	        const titulo =
	            juego.titulo || 'Sin título';

	        grid.innerHTML += `

	            <div class="game-card">

					<div class="game-image">

					    <img
					        src="${juego.portada || 'https://via.placeholder.com/400x220?text=GAMEHUB'}"
					        alt="${juego.titulo}"
					        style="
					            width:100%;
					            height:100%;
					            object-fit:cover;
					        ">

					</div>

	                <div class="game-content">

	                    <span class="badge">
	                        ${genero}
	                    </span>

	                    <h3>
	                        ${titulo}
	                    </h3>

	                    <p>
	                        ${descripcion.substring(0,80)}
	                    </p>

	                    <div class="card-footer">

							<div class="price">

							    ${
							        juego.descuento > 0
							        ?

							        `

							        <div style="
							            color:#ef4444;
							            font-size:.85rem;
							            font-weight:700;
							            margin-bottom:.3rem;
							        ">

							            ${Math.round(
							                juego.descuento
							            )}% OFF

							        </div>

							        <div style="
							            text-decoration:line-through;
							            color:#888;
							            font-size:.85rem;
							        ">

							            COP $
							            ${formatoCOP.format(

							                juego.precio /
							                (
							                    1 -
							                    (
							                        juego.descuento /
							                        100
							                    )
							                )

							            )}

							        </div>

							        <div style="
							            color:#4f6ef7;
							            font-weight:700;
							        ">

							            COP $
							            ${formatoCOP.format(
							                juego.precio
							            )}

							        </div>

							        `

							        :

							        `

							        COP $
							        ${formatoCOP.format(
							            juego.precio
							        )}

							        `
							    }

							</div>

	                        <button
	                            class="btn btn-details"
	                            onclick="verDetalle('${juego.id}')">

	                            Ver detalles

	                        </button>

	                    </div>

	                </div>

	            </div>

	        `;
	    });
	}

    async function buscarJuegos(){

        const titulo =
            document.getElementById(
                'buscarJuego'
            ).value;

        if(!titulo.trim()){

            cargarJuegos();
            return;
        }

        const response =
            await fetch(
                '/api/juegos/buscar?titulo='
                + titulo
            );

        const juegos =
            await response.json();

        renderizarJuegos(juegos);
    }

	function verDetalle(id){

	    window.location.href =
	        '/juego/' + id;

	}

	async function cargarNoticias(){

	    const response =
	        await fetch(
	            '/api/noticias/activas'
	        );

	    const noticias =
	        await response.json();

	    const grid =
	        document.getElementById(
	            'noticiasGrid'
	        );

	    grid.innerHTML='';

	    noticias.forEach(n=>{

	        grid.innerHTML += `

	            <div class="noticia-card">

	                <img
	                    class="noticia-img"
	                    src="${
	                        n.imagen ||
	                        'https://via.placeholder.com/800x400?text=GAMEHUB'
	                    }">

	                <div class="noticia-content">

	                    <span class="badge">

	                        ${n.tipo}

	                    </span>

	                    <h3>

	                        ${n.titulo}

	                    </h3>

	                    <p>

	                        ${n.contenido.substring(0,180)}

	                    </p>

	                </div>

	            </div>

	        `;
	    });
	}

	cargarNoticias();

	cargarJuegos();

</script>

</body>
</html>
