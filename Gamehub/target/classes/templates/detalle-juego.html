<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>GAMEHUB - Videojuego</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet">

    <style>

        :root{
            --navy:#0d0f1a;
            --panel:#13172a;
            --card:#1a1f35;
            --border:#252b45;
            --accent:#4f6ef7;
            --accent2:#7c3aed;
            --text:#e8eaf6;
            --muted:#8b92b0;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:var(--navy);
            color:var(--text);
            font-family:'DM Sans', sans-serif;
            min-height:100vh;
        }

        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:1.5rem 3rem;

            border-bottom:
                    1px solid var(--border);

            background:
                    rgba(0,0,0,.2);
        }

        .logo{

            font-family:'Syne', sans-serif;
            font-size:1.8rem;
            font-weight:800;

            background:
                linear-gradient(
                    135deg,
                    white,
                    var(--accent)
                );

            -webkit-background-clip:text;
            -webkit-text-fill-color:
                    transparent;
        }

        .btn-back{

            background:transparent;
            color:white;

            border:
                1px solid var(--border);

            padding:
                .8rem 1.4rem;

            border-radius:12px;

            cursor:pointer;
        }

        .container{

            max-width:1200px;
            margin:auto;

            padding:
                3rem 2rem;
        }

        .game-wrapper{

            display:grid;

            grid-template-columns:
                420px 1fr;

            gap:3rem;

            align-items:start;
        }

        .cover{

            height:520px;

            border-radius:24px;

            background:
                linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent2)
                );

            display:flex;
            justify-content:center;
            align-items:center;

            font-size:7rem;
        }

        .game-info h1{

            font-family:'Syne';
            font-size:3rem;
            margin-bottom:1rem;
        }

        .genre{

            display:inline-block;

            background:
                rgba(79,110,247,.15);

            color:var(--accent);

            padding:
                .45rem 1rem;

            border-radius:999px;

            margin-bottom:1.5rem;
        }

        .price{

            font-size:2rem;
            font-weight:700;
            color:var(--accent);

            margin-bottom:1rem;
        }

        .developer{

            color:var(--muted);

            margin-bottom:2rem;
        }

        .description{

            line-height:1.9;
            color:var(--text);
            margin-bottom:2rem;
        }

        .btn-buy{

            border:none;
            cursor:pointer;

            padding:
                1rem 2rem;

            border-radius:14px;

            font-size:1rem;
            font-weight:700;

            background:
                var(--accent);

            color:white;
			
        }

        .btn-buy:hover{
            opacity:.85;
        }
		.rating-section{

		    margin-top:2rem;
		}

		.rating-section h3{

		    margin-bottom:1rem;
		    font-family:'Syne';
		}

		.rating-average{

		    margin-bottom:1rem;
		    color:var(--muted);
		}

		.rating-stars{

		    display:flex;
		    gap:.5rem;
		}

		.rating-stars span{

		    font-size:2rem;
		    cursor:pointer;
		    transition:.2s;
		}

		.rating-stars span:hover{

		    transform:scale(1.15);
		}
		.comment-section{

		    margin-top:3rem;
		}

		.comment-section h3{

		    font-family:'Syne';
		    margin-bottom:1rem;
		}

		.comment-box{

		    margin-top:2rem;

		    display:flex;
		    flex-direction:column;

		    gap:1rem;
		}

		.comment-box textarea{

		    background:var(--panel);

		    border:1px solid var(--border);

		    color:var(--text);

		    border-radius:14px;

		    padding:1rem;

		    resize:none;

		    min-height:120px;

		    font-family:'DM Sans';
		}

		.comment-card{

		    background:var(--card);

		    border:1px solid var(--border);

		    border-radius:16px;

		    padding:1rem;

		    margin-bottom:1rem;
		}

		.comment-user{

		    color:var(--accent);

		    font-weight:700;

		    margin-bottom:.5rem;
		}

		.comment-text{

		    color:var(--text);

		    line-height:1.7;
		}
		.login-message{

		    margin-top:2rem;

		    background:rgba(79,110,247,.10);

		    border:1px solid var(--border);

		    border-radius:18px;

		    padding:1rem;

		    text-align:center;

		    color:var(--muted);
		}
		.purchase-section{

		    margin-top:3rem;
		}

    </style>

</head>

<body
      th:attr="data-auth=${#authorization.expression('isAuthenticated()')}">

<div class="navbar">

    <div class="logo">

        GAMEHUB

    </div>

	<button
	        class="btn-back"
	        onclick="volver()">

	    ← Volver

	</button>

</div>

<div class="container">

    <div class="game-wrapper">

		<div
		    class="cover"
		    id="cover">

		</div>

        <div class="game-info">

            <span
                id="genero"
                class="genre">

            </span>

            <h1 id="titulo">

            </h1>

            <div
                id="precio"
                class="price">

            </div>

            <div
                id="desarrollador"
                class="developer">

            </div>

			<p id="descripcion"
			   class="description">
			</p>

			<!-- COMPRA -->

			<div class="purchase-section">

			    <!-- VISITANTE -->

			    <button
			            sec:authorize="isAnonymous()"
			            class="btn-buy"
			            onclick="window.location.href='/login'">

			        Iniciar sesión para comprar

			    </button>

			    <!-- LOGUEADO -->

			    <button
			            sec:authorize="isAuthenticated()"
			            id="btnComprar"
			            class="btn-buy"
			            onclick="comprarJuego()">

			        Comprar videojuego

			    </button>

			</div>

			<!-- CALIFICACIÓN -->

			<div class="rating-section">

			    <h3>

			        Calificación del juego

			    </h3>

			    <div
			        id="promedioTexto"
			        class="rating-average">

			        ⭐ 0.0 / 5

			    </div>

			    <div
			        id="ratingStars"
			        class="rating-stars">

			        <span onclick="calificar(1)">☆</span>
			        <span onclick="calificar(2)">☆</span>
			        <span onclick="calificar(3)">☆</span>
			        <span onclick="calificar(4)">☆</span>
			        <span onclick="calificar(5)">☆</span>

			    </div>
				
				
			</div>
			<div class="comment-section">

							    <h3>

							        Comentarios de jugadores

							    </h3>

							    <div
							        id="listaComentarios">

							    </div>

							    <!-- SOLO LOGUEADOS -->

								<div
								    sec:authorize="isAuthenticated()"
								    class="comment-box">

								    <textarea
								        id="nuevoComentario"
								        placeholder="Escribe un comentario...">

								    </textarea>

								    <button
								        class="btn-buy"
								        onclick="publicarComentario()">

								        Publicar comentario

								    </button>

								</div>

								<div
								    sec:authorize="isAnonymous()"
								    class="login-message">

								    🔒 Inicia sesión para comentar

								</div>

							</div>

        </div>

    </div>

</div>

<script>
	
	function volver(){

	    const autenticado =
	        document.body.dataset.auth;

	    if(autenticado === 'true'){

	        window.location.href =
	            '/dashboard';

	    }else{

	        window.location.href =
	            '/';

	    }
	}

    const formatoCOP =
        new Intl.NumberFormat(
            'es-CO'
        );
		
		// =====================
		// COMPRAS
		// =====================

		async function validarCompra(id){

		    try{

		        const response =
		            await fetch(
		                '/api/compras/validar/' + id
		            );

		        // visitante
		        if(response.status === 403
		        || response.status === 401){

		            return;
		        }

		        const comprado =
		            await response.json();

		        const boton =
		            document.getElementById(
		                'btnComprar'
		            );

		        if(!boton){
		            return;
		        }

		        if(comprado){

		            boton.outerHTML = `

		                <div class="purchase-section">

		                    <button
		                        class="btn-buy"
		                        disabled
		                        style="opacity:.8; cursor:default;">

		                        ✓ Ya adquirido

		                    </button>

		                </div>

		            `;
		        }

		    }catch(error){

		        console.error(error);
		    }
		}

		async function comprarJuego(){

		    const id =
		        window.location.pathname
		            .split('/')
		            .pop();

		    try{

		        const response =
		            await fetch(

		                '/api/compras/' + id,

		                {
		                    method:'POST'
		                }
		            );

		        if(response.ok){

		            alert(
		                'Juego agregado a tu biblioteca'
		            );

		            validarCompra(id);

		        }else{

		            alert(
		                'Ya tienes este videojuego'
		            );
		        }

		    }catch(error){

		        console.error(error);

		        alert(
		            'Error al comprar'
		        );
		    }
		}
		
		// =====================
		// CALIFICACIONES
		// =====================

		async function cargarPromedio(id){

		    try{

		        const response =

		            await fetch(

		                '/api/calificaciones/promedio/'
		                + id
		            );

		        const promedio =
		            await response.json();

		        document.getElementById(
		            'promedioTexto'
		        ).innerText =

		            '⭐ '
		            + promedio.toFixed(1)
		            + ' / 5';

		    }catch(error){

		        console.error(error);
		    }
		}

		async function cargarMiCalificacion(id){

		    try{

		        const response =
		            await fetch(
		                '/api/calificaciones/mia/' + id
		            );

		        // visitante
		        if(response.status === 401
		        || response.status === 403){

		            return;
		        }

		        if(!response.ok){
		            return;
		        }

		        const puntuacion =
		            await response.json();

		        pintarEstrellas(
		            puntuacion
		        );

		    }catch(error){

		        console.log(
		            'Usuario no autenticado'
		        );
		    }
		}

		function pintarEstrellas(
		    puntuacion
		){

		    const estrellas =

		        document.querySelectorAll(
		            '#ratingStars span'
		        );

		    estrellas.forEach(

		        (estrella,index)=>{

		            estrella.innerText =

		                index < puntuacion

		                ? '★'

		                : '☆';
		        }
		    );
		}

		async function calificar(
		    puntuacion
		){

		    const autenticado =
		        document.body.dataset.auth;

		    if(autenticado !== 'true'){

		        alert(
		            'Debes iniciar sesión para calificar'
		        );

		        return;
		    }

		    const id =
		        window.location.pathname
		            .split('/')
		            .pop();

		    try{

		        const response =
		            await fetch(

		                `/api/calificaciones/${id}?puntuacion=${puntuacion}`,

		                {
		                    method:'POST'
		                }
		            );

		        if(response.ok){

		            pintarEstrellas(
		                puntuacion
		            );

		            cargarPromedio(id);

		            alert(
		                'Calificación guardada'
		            );

		        }else{

		            alert(
		                'No se pudo guardar la calificación'
		            );
		        }

		    }catch(error){

		        console.error(error);

		        alert(
		            'Error al calificar'
		        );
		    }
		}
		
		// =====================
		// COMENTARIOS
		// =====================

		async function cargarComentarios(id){

		    try{

		        const response =

		            await fetch(

		                '/api/comentarios/' + id
		            );

		        const comentarios =

		            await response.json();

		        const lista =

		            document.getElementById(
		                'listaComentarios'
		            );

		        lista.innerHTML = '';

		        if(comentarios.length===0){

		            lista.innerHTML = `

		                <p style="
		                    color:#8b92b0;
		                ">

		                    Aún no hay comentarios.

		                </p>

		            `;

		            return;
		        }

		        comentarios.forEach(c=>{

		            lista.innerHTML += `

					<div class="comment-card">

					    <div class="comment-user">

					        ${c.correoJugador}

					    </div>

					    <div class="comment-text">

					        ${c.comentario}

					    </div>

					    <button
					        class="btn-buy"
					        style="
					            margin-top:1rem;
					            padding:.6rem 1rem;
					            font-size:.9rem;
					        "
					        onclick="reportarComentario('${c.id}')">

					        Reportar

					    </button>

					</div>

		            `;
		        });

		    }catch(error){

		        console.error(error);
		    }
		}

		async function publicarComentario(){

		    const texto =

		        document.getElementById(
		            'nuevoComentario'
		        ).value;

		    if(!texto.trim()){

		        alert(
		            'Escribe un comentario'
		        );

		        return;
		    }

		    const id =

		        window.location.pathname
		            .split('/')
		            .pop();

		    try{

		        const response =

		            await fetch(

		                '/api/comentarios/'
		                + id
		                + '?texto='
		                + encodeURIComponent(
		                    texto
		                ),

		                {
		                    method:'POST'
		                }
		            );

		        if(response.ok){

		            alert(
		                'Comentario publicado'
		            );

		            document.getElementById(
		                'nuevoComentario'
		            ).value='';

		            cargarComentarios(id);

		        }else{

		            alert(
							'Debes iniciar sesión para comentar'		            );
		        }

		    }catch(error){

		        console.error(error);

		        alert(
		            'Error publicando comentario'
		        );
		    }
		}
		
		async function reportarComentario(
		    comentarioId
		){

		    const autenticado =
		        document.body.dataset.auth;

		    if(autenticado !== 'true'){

		        alert(
		            'Debes iniciar sesión para reportar'
		        );

		        return;
		    }

		    const motivo = prompt(

		        'Motivo del reporte:'
		    );

		    if(!motivo?.trim()){

		        return;
		    }

		    try{

		        const response =
		            await fetch(

		                '/api/reportes/'
		                + comentarioId
		                + '?motivo='
		                + encodeURIComponent(
		                    motivo
		                ),

		                {
		                    method:'POST'
		                }
		            );

		        if(response.ok){

		            alert(
		                'Comentario reportado'
		            );

		        }else{

		            alert(
		                'No se pudo reportar'
		            );
		        }

		    }catch(error){

		        console.error(error);

		        alert(
		            'Error reportando comentario'
		        );
		    }
		}

    async function cargarJuego(){

        const id =
            window.location.pathname
                .split('/')
                .pop();

        const response =
            await fetch(
                '/api/juegos/' + id
            );

        const juego =
            await response.json();

        document.getElementById(
            'titulo'
        ).innerText =
            juego.titulo;

        document.getElementById(
            'genero'
        ).innerText =
            juego.genero;

			const precio =
			    document.getElementById(
			        'precio'
			    );

			if(juego.descuento > 0){

			    const precioOriginal =
			        juego.precio /
			        (
			            1 -
			            (
			                juego.descuento / 100
			            )
			        );

			    precio.innerHTML = `

			        <div style="
			            color:#ef4444;
			            font-size:1rem;
			            font-weight:700;
			            margin-bottom:.5rem;
			        ">

			            ${Math.round(
			                juego.descuento
			            )}% OFF

			        </div>

			        <div style="
			            text-decoration:line-through;
			            color:#8b92b0;
			            font-size:1rem;
			            margin-bottom:.4rem;
			        ">

			            COP $
			            ${formatoCOP.format(
			                precioOriginal
			            )}

			        </div>

			        <div style="
			            color:#4f6ef7;
			            font-size:2rem;
			            font-weight:800;
			        ">

			            COP $
			            ${formatoCOP.format(
			                juego.precio
			            )}

			        </div>

			    `;

			}else{

			    precio.innerHTML = `

			        COP $
			        ${formatoCOP.format(
			            juego.precio
			        )}

			    `;
			}

        document.getElementById(
            'desarrollador'
        ).innerText =
            'Desarrollador: '
            + juego.desarrollador;

        document.getElementById(
            'descripcion'
        ).innerText =
            juego.descripcion;
			validarCompra(id);
			cargarPromedio(id);
			cargarMiCalificacion(id);
			cargarComentarios(id);
			
			document.getElementById(
			    'cover'
			).innerHTML = `

			    <img
			        src="${
			            juego.portada ||
			            'https://via.placeholder.com/600x900?text=GAMEHUB'
			        }"

			        style="
			            width:100%;
			            height:100%;
			            object-fit:cover;
			            border-radius:24px;
			        ">
			`;
    }
	

    cargarJuego();

</script>
   
</body>
</html>
