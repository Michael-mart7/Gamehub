<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GAMEHUB – Registro</title>
    <link rel="stylesheet" th:href="@{/css/gamehub.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy:   #0d0f1a;
            --panel:  #13172a;
            --card:   #1a1f35;
            --border: #252b45;
            --accent: #4f6ef7;
            --accent2:#7c3aed;
            --text:   #e8eaf6;
            --muted:  #8b92b0;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--navy);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 20%, rgba(79,110,247,.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(124,58,237,.10) 0%, transparent 55%);
            pointer-events: none;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, white, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            text-align: center;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .card-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .card-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: .4rem;
            color: var(--text);
        }

        .card-header p {
            color: var(--muted);
            font-size: .95rem;
        }

        .alert {
            border-radius: 12px;
            padding: .85rem 1.1rem;
            font-size: .9rem;
            margin-bottom: 1.4rem;
            border: 1px solid transparent;
        }

        .alert-error {
            background: rgba(231,76,60,.12);
            border-color: rgba(231,76,60,.3);
            color: #ff6b6b;
        }

        .form-group { margin-bottom: 1.3rem; }

        .form-group label {
            display: block;
            font-size: .88rem;
            color: var(--muted);
            margin-bottom: .5rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
            padding: .9rem 1.1rem;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: .97rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-group input::placeholder { color: #4a5070; }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79,110,247,.15);
        }

        /* Indicador de fortaleza de contraseña */
        .password-strength {
            margin-top: .5rem;
            display: flex;
            gap: .3rem;
        }

        .strength-bar {
            flex: 1;
            height: 3px;
            border-radius: 99px;
            background: var(--border);
            transition: background .3s;
        }

        .strength-label {
            font-size: .78rem;
            color: var(--muted);
            margin-top: .35rem;
        }

        .btn-primary {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: .4rem;
            transition: opacity .2s, transform .2s;
        }
		
		.btn-secondary {

		    width:100%;

		    background:transparent;

		    color:var(--text);

		    border:1px solid var(--border);

		    padding:1rem;

		    border-radius:14px;

		    font-family:'DM Sans', sans-serif;

		    font-size:1rem;

		    font-weight:600;

		    cursor:pointer;

		    margin-top:.8rem;

		    transition:
		        background .2s,
		        border-color .2s,
		        transform .2s;
		}

		.btn-secondary:hover {

		    background:
		        rgba(255,255,255,.05);

		    border-color:
		        var(--accent);

		    transform:
		        translateY(-1px);
		}

        .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

        .card-footer {
            text-align: center;
            margin-top: 1.6rem;
            color: var(--muted);
            font-size: .9rem;
        }

        .card-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .card-footer a:hover { text-decoration: underline; }
    </style>
</head>

<body>

    <div class="logo">GAMEHUB</div>

    <div class="card">

        <div class="card-header">
            <h1>Crear cuenta</h1>
            <p>Únete gratis y empieza a jugar.</p>
        </div>

        <div class="alert alert-error" id="errorMsg" style="display:none;"></div>

        <div class="form-group">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" placeholder="Tu nombre" required/>
        </div>

        <div class="form-group">
            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" placeholder="tu@correo.com" required/>
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres" required oninput="evaluarPassword(this.value)"/>
            <div class="password-strength">
                <div class="strength-bar" id="bar1"></div>
                <div class="strength-bar" id="bar2"></div>
                <div class="strength-bar" id="bar3"></div>
                <div class="strength-bar" id="bar4"></div>
            </div>
            <div class="strength-label" id="strengthLabel"></div>
        </div>

        <button class="btn-primary" id="btnRegistrar" onclick="registrar()">Crear cuenta</button>
		<button
		    type="button"
		    class="btn-secondary"
		    onclick="window.location.href='/'">

		    ← Volver al inicio

		</button>

        <div class="card-footer">
            ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
        </div>

    </div>

<script>
    function evaluarPassword(val) {
        const bars   = [1,2,3,4].map(i => document.getElementById('bar' + i));
        const label  = document.getElementById('strengthLabel');
        const colors = ['#e74c3c','#e67e22','#f1c40f','#27ae60'];
        const labels = ['Muy débil','Débil','Aceptable','Segura'];

        let score = 0;
        if (val.length >= 6)  score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        bars.forEach((b, i) => {
            b.style.background = i < score ? colors[score - 1] : 'var(--border)';
        });

        label.textContent  = val.length > 0 ? labels[score - 1] || '' : '';
        label.style.color  = val.length > 0 ? colors[score - 1] : 'var(--muted)';
    }

    async function registrar() {
        const nombre   = document.getElementById('nombre').value.trim();
        const correo   = document.getElementById('correo').value.trim();
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        const btn      = document.getElementById('btnRegistrar');

        errorMsg.style.display = 'none';

        if (!nombre || !correo || !password) {
            errorMsg.textContent = '✕  Completa todos los campos.';
            errorMsg.style.display = 'block';
            return;
        }

        if (password.length < 6) {
            errorMsg.textContent = '✕  La contraseña debe tener al menos 6 caracteres.';
            errorMsg.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Creando cuenta...';

        try {
            const res = await fetch('/api/auth/registro', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, correo, password })
            });

            if (res.ok) {
                window.location.href = '/login?success';
            } else {
                const msg = await res.text();
                errorMsg.textContent = '✕  ' + (msg || 'Error al registrar. Intenta de nuevo.');
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Crear cuenta';
            }
        } catch (err) {
            errorMsg.textContent = '✕  Error de conexión con el servidor.';
            errorMsg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Crear cuenta';
        }
    }
</script>

</body>
</html>
