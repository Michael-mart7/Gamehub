<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GAMEHUB – Iniciar sesión</title>
    <link rel="stylesheet" th:href="@{/css/gamehub.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy:   #0d0f1a;
            --panel:  #13172a;
            --card:   #1a1f35;
            --border: #252b45;
            --accent: #4f6ef7;
            --accent2:#7c3aed;
            --text:   #e8eaf6;
            --muted:  #8b92b0;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--navy);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Fondo con gradiente sutil */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 20%, rgba(79,110,247,.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(124,58,237,.10) 0%, transparent 55%);
            pointer-events: none;
        }

        /* LOGO */
        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, white, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            text-align: center;
        }

        /* CARD */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .card-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .card-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: .4rem;
            color: var(--text);
        }

        .card-header p {
            color: var(--muted);
            font-size: .95rem;
        }

        /* ALERTAS */
        .alert {
            border-radius: 12px;
            padding: .85rem 1.1rem;
            font-size: .9rem;
            margin-bottom: 1.4rem;
            border: 1px solid transparent;
        }

        .alert-error {
            background: rgba(231,76,60,.12);
            border-color: rgba(231,76,60,.3);
            color: #ff6b6b;
        }

        .alert-success {
            background: rgba(39,174,96,.12);
            border-color: rgba(39,174,96,.3);
            color: #6bcb8b;
        }

        /* FORM */
        .form-group {
            margin-bottom: 1.3rem;
        }

        .form-group label {
            display: block;
            font-size: .88rem;
            color: var(--muted);
            margin-bottom: .5rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
            padding: .9rem 1.1rem;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: .97rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-group input::placeholder { color: #4a5070; }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79,110,247,.15);
        }

        /* BOTÓN */
        .btn-primary {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: .4rem;
            transition: opacity .2s, transform .2s;
        }

        .btn-primary:hover {
            opacity: .88;
            transform: translateY(-1px);
        }
		
		.btn-secondary {

		    width:100%;

		    background:transparent;

		    color:var(--text);

		    border:1px solid var(--border);

		    padding:1rem;

		    border-radius:14px;

		    font-family:'DM Sans', sans-serif;

		    font-size:1rem;

		    font-weight:600;

		    cursor:pointer;

		    margin-top:.8rem;

		    transition:
		        background .2s,
		        border-color .2s,
		        transform .2s;
		}

		.btn-secondary:hover {

		    background:
		        rgba(255,255,255,.05);

		    border-color:
		        var(--accent);

		    transform:
		        translateY(-1px);
		}

        /* FOOTER */
        .card-footer {
            text-align: center;
            margin-top: 1.6rem;
            color: var(--muted);
            font-size: .9rem;
        }

        .card-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .card-footer a:hover { text-decoration: underline; }
    </style>
</head>

<body>

    <div class="logo">GAMEHUB</div>

    <div class="card">

        <div class="card-header">
            <h1>Iniciar sesión</h1>
            <p>Bienvenido de nuevo. Ingresa tus datos.</p>
        </div>

        <!-- Error -->
        <div th:if="${param.error}" class="alert alert-error">
            ✕ &nbsp;Correo o contraseña incorrectos.
        </div>

        <!-- Registro exitoso -->
        <div th:if="${param.success}" class="alert alert-success">
            ✓ &nbsp;Registro exitoso. Ahora puedes iniciar sesión.
        </div>

        <!-- Logout -->
        <div th:if="${param.logout}" class="alert alert-success">
            ✓ &nbsp;Sesión cerrada correctamente.
        </div>

        <!-- FORM -->
        <form method="post" action="/login">

            <div class="form-group">
                <label for="username">Correo electrónico</label>
                <input
                    type="email"
                    id="username"
                    name="username"
                    placeholder="tu@correo.com"
                    required/>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="••••••••"
                    required/>
            </div>

            <button type="submit" class="btn-primary">
                Iniciar sesión
            </button>
			<button
			    type="button"
			    class="btn-secondary"
			    onclick="window.location.href='/'">

			    ← Volver al inicio

			</button>

        </form>

        <div class="card-footer">
            ¿No tienes cuenta?
            <a href="/registro">Regístrate aquí</a>
        </div>

    </div>

</body>
</html>
