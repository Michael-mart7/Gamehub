<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>404 - Página no encontrada</title>

    <link rel="stylesheet" href="/css/gamehub.css">

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet">

    <style>

        :root{

            --navy:#0d0f1a;
            --card:#1a1f35;
            --border:#252b45;
            --accent:#4f6ef7;
            --text:#e8eaf6;
            --muted:#8b92b0;

        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:var(--navy);

            font-family:'DM Sans', sans-serif;

            color:var(--text);

            padding:2rem;

        }

        .error-card{

            width:100%;
            max-width:600px;

            background:var(--card);

            border:1px solid var(--border);

            border-radius:24px;

            padding:4rem 3rem;

            text-align:center;

            box-shadow:0 30px 80px rgba(0,0,0,.45);

        }

        .error-number{

            font-size:7rem;

            font-family:'Syne', sans-serif;

            font-weight:800;

            line-height:1;

            background:linear-gradient(
                135deg,
                #ffffff,
                var(--accent)
            );

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;

            margin-bottom:1rem;

        }

        .error-title{

            font-size:2rem;

            margin-bottom:1rem;

            font-family:'Syne', sans-serif;

        }

        .error-description{

            color:var(--muted);

            font-size:1rem;

            line-height:1.7;

            margin-bottom:2rem;

        }

        .btn-home{

            background:var(--accent);

            color:white;

            border:none;

            padding:0.9rem 1.8rem;

            border-radius:12px;

            font-size:0.95rem;

            font-weight:600;

            cursor:pointer;

            transition:0.2s;

        }

        .btn-home:hover{

            opacity:.85;

            transform:translateY(-2px);

        }

    </style>

</head>

<body>

<div class="error-card">

    <div class="error-number">
        404
    </div>

    <h1 class="error-title">
        Página no encontrada
    </h1>

    <p class="error-description">

        La ruta a la que intentas acceder no existe
        o fue movida dentro de GAMEHUB.

    </p>

    <button
        class="btn-home"
        onclick="window.location.href='/dashboard'">

        Volver al dashboard

    </button>

</div>

</body>
</html>
